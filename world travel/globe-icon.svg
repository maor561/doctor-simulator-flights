<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <radialGradient id="globeGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="landGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="256" cy="256" r="200" fill="url(#globeGradient)" stroke="#1E88E5" stroke-width="3"/>

  <!-- Land masses (simplified) -->
  <ellipse cx="200" cy="200" rx="60" ry="50" fill="url(#landGradient)"/>
  <ellipse cx="300" cy="280" rx="80" ry="60" fill="url(#landGradient)"/>
  <ellipse cx="250" cy="150" rx="40" ry="35" fill="url(#landGradient)"/>

  <!-- Grid lines -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>
  <line x1="256" y1="56" x2="256" y2="456" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>
  <line x1="56" y1="256" x2="456" y2="256" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>

  <!-- Airplane paths -->
  <path d="M 120 150 Q 200 100 280 180" fill="none" stroke="#E8B4B8" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <path d="M 300 200 Q 350 200 380 270" fill="none" stroke="#E8B4B8" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <path d="M 180 300 Q 250 350 350 300" fill="none" stroke="#E8B4B8" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  <path d="M 320 120 Q 280 180 240 240" fill="none" stroke="#E8B4B8" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>

  <!-- Airplane 1 -->
  <g transform="translate(150, 140)">
    <polygon points="0,-8 8,8 0,4 -8,8" fill="#FFFFFF" stroke="#E91E63" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#E91E63" opacity="0.8"/>
  </g>

  <!-- Airplane 2 -->
  <g transform="translate(340, 220)">
    <polygon points="0,-8 8,8 0,4 -8,8" fill="#FFFFFF" stroke="#E91E63" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#E91E63" opacity="0.8"/>
  </g>

  <!-- Airplane 3 -->
  <g transform="translate(220, 310)">
    <polygon points="0,-8 8,8 0,4 -8,8" fill="#FFFFFF" stroke="#E91E63" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#E91E63" opacity="0.8"/>
  </g>

  <!-- Airplane 4 -->
  <g transform="translate(290, 180)">
    <polygon points="0,-8 8,8 0,4 -8,8" fill="#FFFFFF" stroke="#E91E63" stroke-width="1"/>
    <circle cx="0" cy="0" r="6" fill="#E91E63" opacity="0.8"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#E91E63" stroke-width="3"/>
</svg>
