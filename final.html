<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f3e7ff, #e3f2fd);
            color: #212121;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #e91e63; margin-bottom: 5px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { background: #0288d1; color: white; }
        .btn-primary:hover { background: #0277bd; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #da190b; }
        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            color: #4caf50;
            margin-bottom: 20px;
        }
        .message {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .message.show { display: block; }
        .message.success { background: #c8e6c9; color: #2e7d32; }
        .message.error { background: #ffcdd2; color: #c62828; }
        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .route {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }
        .route:hover { border-color: #0288d1; background: #e3f2fd; }
        .route.done { opacity: 0.6; }
        .route-number { font-weight: 600; color: #0288d1; margin-bottom: 5px; }
        .route-code { font-size: 13px; color: #666; margin-bottom: 8px; }
        .route-name { font-weight: 500; margin-bottom: 5px; }
        .route-time { font-size: 12px; color: #999; margin-bottom: 10px; }
        .route-check { margin-bottom: 10px; }
        .route-check input { margin-right: 8px; cursor: pointer; }
        .route-dates {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }
        .route-dates input {
            flex: 1;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #e91e63; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-buttons button { flex: 1; }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <header>
        <h1>✈️ Doctor Simulator</h1>
        <p>🌍 מסלול טיסות סביב העולם</p>
    </header>

    <div class="container">
        <div id="message" class="message"></div>

        <div class="panel">
            <div class="controls">
                <button class="btn-primary" onclick="toggleShowDone()">הצג בוצע</button>
                <button class="btn-success" onclick="saveToServer()">💾 שמור</button>
                <button class="btn-danger" onclick="showPasswordModal()">🔐 עריכה</button>
                <span style="flex: 1; text-align: right; padding: 10px; font-weight: 600; color: #4caf50;" id="adminStatus"></span>
            </div>

            <div class="stats">
                מסלולים שהושלמו: <span id="completed">0</span>/47
            </div>

            <div id="routesList" class="routes-grid"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h2>🔐 סיסמה לעריכה</h2>
            <input type="password" id="passwordInput" placeholder="הזן סיסמה" onkeypress="if(event.key==='Enter')checkPassword()">
            <div class="modal-buttons">
                <button class="btn-primary" onclick="checkPassword()">אישור</button>
                <button class="btn-danger" onclick="closePasswordModal()">ביטול</button>
            </div>
        </div>
    </div>

    <script>
const ADMIN_PASSWORD = 'GayaAlma85';
const routes = [

{id:41,num:41,from:"YPDN",to:"WADD",name:"באלי (דנפסר), אינדונזיה",time:100},
{id:42,num:42,from:"WADD",to:"WMKP",name:"קואלה לומפור, מלזיה",time:125},
{id:43,num:43,from:"WMKP",to:"VTBS",name:"בנגקוק, תאילנד",time:110},

{id:45,num:45,from:"VOCI",to:"OOMS",name:"מאסקט, עומאן",time:120},
{id:46,num:46,from:"OOMS",to:"OTHH",name:"דוחא, קטאר",time:75},
{id:47,num:47,from:"OTHH",to:"LLBG",name:"נתב\"ג, תל אביב",time:135}
];

let isAdmin = false;
let showDone = false;
let completed = {};
let routeDates = {};

function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message show ' + type;
    setTimeout(() => msg.classList.remove('show'), 3000);
}

function updateAdminStatus() {
    document.getElementById('adminStatus').textContent = isAdmin ? '✅ מצב עריכה' : '';
}

function loadFromServer() {
    fetch('save-data.php')
        .then(r => r.json())
        .then(data => {
            completed = data.completed || {};
            routeDates = data.dates || {};
            render();
        })
        .catch(() => render());
}

function saveToServer() {
    fetch('save-data.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({completed, dates: routeDates})
    })
    .then(r => r.json())
    .then(data => {
        showMessage('✅ נשמר בהצלחה!', 'success');
    })
    .catch(() => showMessage('❌ שגיאה בשמירה', 'error'));
}

function toggleRoute(id) {
    if (!isAdmin) { showPasswordModal(); return; }
    completed[id] = !completed[id];
    saveToServer();
    render();
}

function updateDate(id, value) {
    if (!isAdmin) return;
    if (!routeDates[id]) routeDates[id] = {};
    routeDates[id].date = value;
    saveToServer();
}

function updateTime(id, value) {
    if (!isAdmin) return;
    if (!routeDates[id]) routeDates[id] = {};
    routeDates[id].time = value;
    saveToServer();
}

function toggleShowDone() {
    showDone = !showDone;
    render();
}

function showPasswordModal() {
    document.getElementById('passwordModal').classList.add('show');
    document.getElementById('passwordInput').focus();
}

function closePasswordModal() {
    document.getElementById('passwordModal').classList.remove('show');
    document.getElementById('passwordInput').value = '';
}

function checkPassword() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
        isAdmin = true;
        closePasswordModal();
        updateAdminStatus();
        showMessage('✅ הצלחת! עכשיו אתה יכול לערוך!', 'success');
        render();
    } else {
        showMessage('❌ סיסמה שגויה!', 'error');
        document.getElementById('passwordInput').value = '';
    }
}

function render() {
    let list = showDone ? routes : routes.filter(r => !completed[r.id]);

    document.getElementById('routesList').innerHTML = list.map(r => {
        const date = routeDates[r.id]?.date || '';
        const time = routeDates[r.id]?.time || '';
        return `
            <div class="route ${completed[r.id] ? 'done' : ''}">
                <div class="route-number">✈️ טיסה #${r.num}</div>
                <div class="route-code">${r.from} ← → ${r.to}</div>
                <div class="route-name">${r.name}</div>
                <div class="route-time">⏱️ ${r.time} דקות</div>
                <div class="route-check">
                    <input type="checkbox" ${completed[r.id] ? 'checked' : ''} onchange="toggleRoute(${r.id})" ${!isAdmin ? 'disabled' : ''}>
                    <label>סימון בוצע</label>
                </div>
                <div class="route-dates">
                    <input type="date" value="${date}" onchange="updateDate(${r.id}, this.value)" ${!isAdmin ? 'disabled' : ''} placeholder="תאריך">
                    <input type="time" value="${time}" onchange="updateTime(${r.id}, this.value)" ${!isAdmin ? 'disabled' : ''} placeholder="שעה">
                </div>
            </div>
        `;
    }).join('');

    const count = Object.values(completed).filter(Boolean).length;
    document.getElementById('completed').textContent = count;
}

window.onload = () => {
    updateAdminStatus();
    loadFromServer();
};
    </script>
</body>
</html>
