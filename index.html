        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f3e7ff, #e3f2fd);
            color: #212121;
            padding: 20px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 20px;
        }
        header .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        header .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        header .title {
            flex: 1;
            text-align: center;
            min-width: 200px;
        }
        h1 { color: #e91e63; margin-bottom: 5px; }
        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .map-panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-height: 600px;
        }
        #map { width: 100%; height: 600px; border-radius: 8px; }
        .routes-panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-height: 800px;
            overflow-y: auto;
        }
        @media (max-width: 1024px) {
            .main-layout {
                flex-direction: column;
                gap: 15px;
            }
            .map-panel {
                min-height: 400px;
            }
            #map { height: 400px; }
            .routes-panel {
                max-height: 600px;
            }
            header .logo {
                width: 60px;
                height: 60px;
            }
        }
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            header {
                padding: 12px;
                gap: 8px;
            }
            header .logo {
                width: 50px;
                height: 50px;
            }
            header .title {
                min-width: 150px;
            }
            h1 {
                font-size: 18px;
            }
            p {
                font-size: 13px;
            }
            .main-layout {
                gap: 10px;
            }
            .map-panel {
                min-height: 250px;
                padding: 8px;
            }
            #map { height: 250px; }
            .routes-panel {
                padding: 10px;
                max-height: none;
                overflow-y: visible;
            }
            .route {
                padding: 10px;
                gap: 8px;
                flex-direction: column;
            }
            .route-right {
                flex: 0 0 auto;
                width: 100%;
                align-items: flex-end;
                order: -1;
            }
            .route-left {
                flex: 0 0 auto;
                width: 100%;
            }
            .route-left input {
                min-height: 50px;
                font-size: 14px;
                padding: 6px 4px;
                border-radius: 6px;
            }
            .route-label {
                font-size: 16px;
            }
            .route-airports {
                font-size: 13px;
                gap: 4px;
            }
            .route-arrow {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
            .route-cities {
                font-size: 11px;
                gap: 15px;
            }
            .route-duration {
                font-size: 16px;
            }
            .flag-badge {
                width: 20px;
                height: 15px;
            }
            .route-bottom {
                margin-top: 4px;
                padding-top: 6px;
            }
            .controls {
                gap: 6px;
            }
            .controls button {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { background: #0288d1; color: white; }
        .btn-primary:hover { background: #0277bd; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover { background: #45a049; }
        .btn-danger { background: #f44336; color: white; }
        .btn-danger:hover { background: #da190b; }
        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            color: #4caf50;
            margin-bottom: 20px;
        }
        .message {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            max-width: 400px;
        }
        .message.show { display: block; }
        .message.success { background: #c8e6c9; color: #2e7d32; }
        .message.error { background: #ffcdd2; color: #c62828; }
        .routes-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .route {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 0;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0;
            align-items: flex-start;
        }
        .route > div:not(.metar-section) {
            padding: 16px 16px 0 16px;
            width: 100%;
        }
        .route > .route-left,
        .route > .route-right,
        .route > .route-bottom {
            padding: 16px 16px 0 16px;
        }
        .route > .route-bottom {
            padding: 8px 16px 16px 16px;
        }
        .route:hover { border-color: #7b1fa2; box-shadow: 0 2px 12px rgba(123,31,162,0.15); }
        .route.active { border-color: #e91e63; background: #fce4ec; }
        .route.done { opacity: 0.6; }

        /* LEFT COLUMN - date/time boxes */
        .route-left {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .route-left input {
            flex: 1;
            min-width: 0;
            padding: 8px 4px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            background: #5c7a9a;
            color: white;
            text-align: center;
            cursor: pointer;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            direction: ltr;
        }
        .route-left input::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* RIGHT COLUMN - flight info */
        .route-right {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            text-align: right;
        }
        .route-label {
            font-weight: 700;
            color: #212121;
            font-size: 20px;
        }
        .route-airports {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 700;
            color: #333;
            direction: ltr;
        }
        .flag-badge {
            width: 24px;
            height: 18px;
            border-radius: 3px;
            flex-shrink: 0;
            object-fit: cover;
            border: 1px solid #ddd;
        }
        .route-arrow {
            background: #7b1fa2;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        .route-cities {
            display: flex;
            font-size: 12px;
            color: #888;
            justify-content: space-between;
            direction: ltr;
            width: 100%;
            padding: 0 30px;
        }
        .route-cities span { text-align: center; }

        /* METAR weather section */
        .metar-section {
            width: 100%;
            margin-top: 0;
            margin-left: 0;
            margin-right: 0;
            padding: 10px 16px;
            background: linear-gradient(135deg, #f0f4ff, #f8f0ff);
            border-radius: 0;
            border: none;
            border-top: 1px solid #e0d8f0;
            direction: ltr;

            font-weight: 700;
            color: #7b1fa2;
            margin-bottom: 5px;
            text-align: center;

            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #555;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            padding: 3px 0;
            justify-content: space-between;

            color: #0288d1;
            min-width: 50px;
            flex-shrink: 0;
        }
        .metar-data {
            color: #333;
            flex: 1;
            text-align: right;

            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;

        .metar-cat.MVFR { background: #bbdefb; color: #1565c0; }
        .metar-cat.IFR { background: #ffcdd2; color: #c62828; }
        .metar-cat.LIFR { background: #f8bbd0; color: #880e4f; }
        .metar-cat.CAVOK { background: #c8e6c9; color: #2e7d32; }

            font-size: 20px;
            font-weight: 700;
            color: #e91e63;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .route-bottom {
            flex: 0 0 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            padding-top: 8px;
            border-top: 1px solid #f0e0f5;
        }
        .route-bottom input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #7b1fa2;
        }
        .route-bottom label {
            cursor: pointer;
            font-size: 13px;
            color: #666;
            margin: 0;
        }
        /* unused old classes removed */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 { margin-bottom: 20px; color: #e91e63; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        .modal-buttons button { flex: 1; }
        @media (max-width: 1024px) {
            .main-layout { flex-direction: column; }
            .routes-panel { max-height: none; overflow-y: visible; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Doctor Simulator Logo">
        </div>
        <div class="title">
            <h1>✈️ Doctor Simulator</h1>
            <p>🌍 מסלול טיסות סביב העולם</p>
        </div>
        <button id="installBtn" class="btn-primary" style="display:none; white-space:nowrap;">📱 הוסף לבית</button>
    </header>

    <div id="message" class="message"></div>

    <div class="main-layout">
        <div class="map-panel">
            <div id="map"></div>
        </div>

        <div class="routes-panel">
            <div class="controls">
                <button class="btn-primary" onclick="toggleShowDone()">הצג בוצע</button>
                <button class="btn-success" onclick="saveToServer()">💾 שמור</button>
                <button class="btn-primary" onclick="location.reload()">🔄 רענן</button>
                <button class="btn-danger" onclick="showPasswordModal()">🔐 עריכה</button>
                <span style="flex: 1; text-align: right; padding: 10px; font-weight: 600; color: #4caf50;" id="adminStatus"></span>
            </div>

            <div class="stats">
                מסלולים שהושלמו: <span id="completed">0</span>/<span id="totalRoutes">0</span>
            </div>

            <div id="routesList" class="routes-list"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h2>🔐 סיסמה לעריכה</h2>
            <input type="password" id="passwordInput" placeholder="הזן סיסמה" onkeypress="if(event.key==='Enter')checkPassword()">
            <div class="modal-buttons">
                <button class="btn-primary" onclick="checkPassword()">אישור</button>
                <button class="btn-danger" onclick="closePasswordModal()">ביטול</button>
            </div>
        </div>
    </div>

// Calculate flight time based on distance between airports
function calculateFlightTime(from, to) {
    const fromCoords = airports[from];
    const toCoords = airports[to];

    if (!fromCoords || !toCoords) {
        return 90; // Default fallback
    }

    // Haversine formula to calculate distance between two points (lat/lon)
    const R = 6371; // Earth's radius in km
    const lat1 = fromCoords[0] * Math.PI / 180;
    const lat2 = toCoords[0] * Math.PI / 180;
    const dLat = (toCoords[0] - fromCoords[0]) * Math.PI / 180;
    const dLon = (toCoords[1] - fromCoords[1]) * Math.PI / 180;

    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1) * Math.cos(lat2) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    const distance = R * c; // Distance in km

    // Assume cruise speed of ~500 km/h for commercial aircraft
    // Add 10% for taxi, climb, descent
    const cruiseTime = (distance / 500) * 60; // Convert to minutes
    const totalTime = Math.round(cruiseTime * 1.1);

    return totalTime > 30 ? totalTime : 90; // Minimum 90 minutes
}

// Get or create airport info dynamically
function getOrCreateAirportInfo(icao) {
    // Check if in predefined list
    if (airportInfo[icao]) {
        return airportInfo[icao];
    }

    // Check if we've already created this airport dynamically
    if (dynamicAirports[icao]) {
        return dynamicAirports[icao];
    }

    // Create dynamic airport entry
    const countryCode = getCountryCodeFromICAO(icao);
    const flagEmoji = getFlagEmoji(countryCode);

    const info = {
        city: icao, // Use ICAO as fallback city name
        country: flagEmoji,
        flag: countryCode,
        isDynamic: true
    };

    dynamicAirports[icao] = info;
    return info;
}

// Load routes from Google Sheet
// Step 1: Load raw route data from sheet (without airport info)
async function loadRawRoutesFromSheet() {
    try {
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1FxCamcUs_L8-IT3ea24x0DYCg7-dig7a1Tz5rlIjZxY/export?format=csv&t=' + Date.now();
        const response = await fetch(sheetUrl);
        const csv = await response.text();
        const lines = csv.trim().split('\n');

        const rawRoutes = [];
        const airportCodes = new Set();

        // Skip header (row 0)
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            if (cols.length >= 3) {
                const num = parseInt(cols[0]) || i;
                // Strip invisible Unicode characters (RTL/LTR marks, zero-width spaces, bidirectional marks, etc)
                const sanitize = (str) => str.toUpperCase().trim().replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u206F]/g, '');
                const from = sanitize(cols[1]);
                const to = sanitize(cols[2]);

                // Collect airport codes
                airportCodes.add(from);
                airportCodes.add(to);

                // Store raw route data (airport info will be added later)
                rawRoutes.push({ num, from, to });
            }
        }

        if (rawRoutes.length > 0) {
            console.log('📋 Loaded ' + rawRoutes.length + ' raw routes from Google Sheet');
            console.log(`📍 Found ${airportCodes.size} unique airports`);
            return { rawRoutes, airportCodes: Array.from(airportCodes) };
        } else {
            throw new Error('No routes parsed from Sheet');
        }
    } catch(e) {
        console.log('❌ Failed to load from Sheet:', e.message);
        await loadFallbackRoutes();
        return { rawRoutes: [], airportCodes: [] };
    }
}

// Step 2: Build routes with airport info (after airports are loaded)
function buildRoutesWithAirportInfo(rawRoutes) {
    routes = [];
    for (let rawRoute of rawRoutes) {
        const fromInfo = getOrCreateAirportInfo(rawRoute.from);
        const toInfo = getOrCreateAirportInfo(rawRoute.to);
        const time = calculateFlightTime(rawRoute.from, rawRoute.to);

        routes.push({
            id: rawRoute.num,
            num: rawRoute.num,
            from: rawRoute.from,
            fromCity: (fromInfo && fromInfo.city) ? fromInfo.city : rawRoute.from,
            fromCountry: (fromInfo && fromInfo.country) ? fromInfo.country : '🌍',
            to: rawRoute.to,
            toCity: (toInfo && toInfo.city) ? toInfo.city : rawRoute.to,
            toCountry: (toInfo && toInfo.country) ? toInfo.country : '🌍',
            name: (toInfo && toInfo.city) ? toInfo.city : rawRoute.to,
            time: time
        });
    }
    console.log('✅ Built ' + routes.length + ' routes with airport info');
}

// ===== CLOUD STORAGE via Vercel KV (Upstash Redis) =====
// All data goes through /api/save-data which uses Vercel KV on the server side

async function loadFromServer() {
    // PRIORITY 1: Load from server API (uses Vercel KV in production)
    try {
        console.log('☁️ Loading from server...');
        const response = await fetch('/api/save-data');
        if (response.ok) {
            const result = await response.json();
            if (result.data && typeof result.data === 'object') {
                completed = result.data.completed || {};
                routeDates = result.data.dates || {};
                console.log('✅ Data loaded from server (' + (result.storage || 'unknown') + ') - dates:', Object.keys(routeDates).length, 'completed:', Object.keys(completed).length);
                return;
            }
        }
    } catch (e) {
        console.warn('⚠️ Could not load from server:', e.message);
    }

    // PRIORITY 2: Fallback to localStorage (offline cache)
    try {
        const savedCompleted = localStorage.getItem('doctor-simulator-completed');
        const savedDates = localStorage.getItem('doctor-simulator-dates');
        if (savedCompleted) completed = JSON.parse(savedCompleted);
        if (savedDates) routeDates = JSON.parse(savedDates);
        if (savedCompleted || savedDates) {
            console.log('💾 Data loaded from localStorage cache');
            return;
        }
    } catch (e) {
        console.log('📝 localStorage unavailable (incognito mode)');
    }
}

function saveToServer() {
    // PRIMARY: Save to server API (Vercel KV in production, file in local dev)
    fetch('/api/save-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed, dates: routeDates })
    })
    .then(response => {
        if (response.ok) {
            return response.json().then(result => {
                console.log('☁️ Data saved to server (' + (result.storage || 'unknown') + ')');
                showMessage('✅ נשמר בהצלחה!', 'success');
            });
        } else {
            console.warn('⚠️ Server save failed:', response.status);
            showMessage('⚠️ שגיאה בשמירה לשרת', 'error');
        }
    })
    .catch(err => {
        if (err.name === 'AbortError') return;
        console.error('❌ Server save error:', err.message);
        showMessage('❌ שגיאת חיבור לשרת', 'error');
    });

    // SECONDARY: Cache to localStorage for offline speed
    try {
        localStorage.setItem('doctor-simulator-completed', JSON.stringify(completed));
        localStorage.setItem('doctor-simulator-dates', JSON.stringify(routeDates));
    } catch (e) { /* incognito mode - ok */ }
}

// Opens TeamUp in a new tab with pre-filled event data
function addToTeamUp(routeId) {
    const route = routes.find(r => r.id == routeId);
    if (!route) return;

    const routeData = routeDates[routeId];
    if (!routeData || !routeData.date || !routeData.time) {
        console.log('⏭️ Skipping TeamUp - no date/time set for route', routeId);
        return;
    }

    const routeName = route.name || route.toCity || route.to;
    const [hours, minutes] = routeData.time.split(':');
    const endHours = (parseInt(hours) + 1) % 24;
    const endTime = String(endHours).padStart(2, '0') + ':' + minutes;

    // TeamUp calendar URL with pre-filled event
    const params = new URLSearchParams({
        calendar: 'o7y5wi',
        title: `✈️ ${routeName}`,
        startDate: routeData.date,
        startTime: routeData.time,
        endDate: routeData.date,
        endTime: endTime,
        location: routeName,
        notes: `Flight Route ID: ${routeId}`
    });

    const teamupUrl = `https://teamup.com/create?${params.toString()}`;
    console.log('📅 Opening TeamUp:', teamupUrl);
    window.open(teamupUrl, '_blank');
}

function parseMetarRaw(raw) {
    if (!raw || raw === 'N/A' || raw.length < 10) return null;
    const parts = raw.trim().split(/\s+/);
    let temp = '', wind = '', conditions = '', qnh = '';

    for (const p of parts) {
        // Temperature: M05/M10 or 25/15
        if (/^M?\d{2}\/M?\d{2,}$/.test(p)) {
            let t = p.split('/')[0];
            if (t.startsWith('M')) t = '-' + t.slice(1);
            temp = parseInt(t) + '°C';
        }
        // Wind: 29010KT or VRB05KT
        if (/^(\d{3}|VRB)\d{2,3}(G\d{2,3})?KT$/.test(p)) {
            const match = p.match(/(\d{3}|VRB)(\d{2,3})/);
            if (match) {
                const dir = match[1] === 'VRB' ? 'VRB' : match[1] + '°';
                wind = dir + '/' + match[2] + 'kt';
            }
        }
        // CAVOK
        if (p === 'CAVOK') conditions = 'CAVOK';
        // QNH
        if (/^Q\d{4}$/.test(p)) qnh = p;
    }

    // Visibility-based category if no CAVOK
    if (!conditions) {
        for (const p of parts) {
            if (/^\d{4}$/.test(p) && !/^\d{4}Z$/.test(p)) {
                const vis = parseInt(p);
                if (vis >= 5000) conditions = 'VFR';
                else if (vis >= 1500) conditions = 'MVFR';
                else if (vis >= 500) conditions = 'IFR';
                else conditions = 'LIFR';
                break;
            }
        }
    }

    return { raw: raw.trim(), temp, wind, conditions: conditions || '', qnh };
}

function formatMetar(data) {
    if (!data || !data.temp) return '<span style="color:#999">טוען...</span>';
    const parts = [];
    if (data.temp) parts.push('🌡️' + data.temp);
    if (data.wind) parts.push('💨' + data.wind);
    if (data.qnh) parts.push('📊' + data.qnh);
    let cat = '';
    if (data.conditions) {
        cat = ' <span class="metar-cat ' + data.conditions + '">' + data.conditions + '</span>';
    }
    return parts.join(' | ') + cat;
}

async function fetchMetar(icao) {
    if (metarCache[icao] !== undefined) return metarCache[icao];
    if (metarPending[icao]) return metarPending[icao];

    const promise = (async () => {
        // Try Vercel API endpoint first
        try {
            const response = await fetch(`/api/metar?icao=${icao}&v=2`);
            if (response.ok) {
                const data = await response.json();
                if (data.metar && data.metar !== 'N/A') {
                    metarCache[icao] = parseMetarRaw(data.metar) || { raw: 'N/A', temp: '', wind: '', conditions: '', qnh: '' };
                    delete metarPending[icao];
                    return metarCache[icao];
                }
            }
        } catch(e) {
            console.warn(`⚠️ METAR fetch failed for ${icao}:`, e.message);
        }

        metarCache[icao] = { raw: 'N/A', temp: 'N/A', wind: '', conditions: '', qnh: '' };
        delete metarPending[icao];
        return metarCache[icao];
    })();

    metarPending[icao] = promise;
    return promise;
}

    completed[id] = !completed[id];
    // Update all polylines on map to reflect completion state

        dr.polyline.setStyle({
            color: completed[dr.id] ? '#4caf50' : '#e91e63'

    saveToServer();
    render();
}

    return [20, 0];
}

function drawMapRoute(routeId) {
    const route = routes.find(r => r.id === routeId);
    if (!route) return;

    const from = getOrCreateCoordinates(route.from);
    const to = getOrCreateCoordinates(route.to);

    const polyline = L.polyline([from, to], {
        color: completed[routeId] ? '#4caf50' : '#e91e63',
        weight: 3,
        opacity: 0.8
    }).addTo(map);

    // Add tooltip to polyline (LEG info)
    polyline.bindTooltip(
        `<strong style="color:#333">LEG #${route.num}</strong><br>${route.from} → ${route.to}<br>${route.time} דקות`,
        {permanent: false, direction: 'center', sticky: true}
    );

    // Add markers with tooltips (airport info)
    const fromMarker = L.circleMarker(from, {radius: 5, color: '#0288d1', fillOpacity: 0.8}).addTo(map);
    const toMarker = L.circleMarker(to, {radius: 5, color: '#0288d1', fillOpacity: 0.8}).addTo(map);

    fromMarker.bindTooltip(`<strong>${route.from}</strong><br>${route.fromCity || ''}<br>${route.fromCountry || ''}`,
        {permanent: false, direction: 'top', offset: [0, -10]});

    toMarker.bindTooltip(`<strong>${route.to}</strong><br>${route.toCity || ''}<br>${route.toCountry || ''}`,
        {permanent: false, direction: 'top', offset: [0, -10]});

    drawnRoutes.push({id: routeId, polyline: polyline, fromMarker: fromMarker, toMarker: toMarker});
}

function zoomToRoute(routeId) {
    const route = routes.find(r => r.id === routeId);
    if (!route) return;

    const from = getOrCreateCoordinates(route.from);
    const to = getOrCreateCoordinates(route.to);

    if (!from || !to) return;

    selectedRoute = routeId;

    drawnRoutes.forEach(r => {
        if (r.polyline) {
            r.polyline.setStyle({
                weight: r.id === routeId ? 5 : 3,
                opacity: r.id === routeId ? 1 : 0.6
            });
        }
    });

    const bounds = L.latLngBounds([from, to]);
    map.fitBounds(bounds, {padding: [50, 50], maxZoom: 8});

    render();
}

function render() {
    let list = showDone ? routes : routes.filter(r => !completed[r.id]);

    // Update total routes count
    document.getElementById('totalRoutes').textContent = routes.length;

    document.getElementById('routesList').innerHTML = list.map(r => {
        const date = routeDates[r.id]?.date || '';
        const time = routeDates[r.id]?.time || '';
        return `
            <div class="route ${completed[r.id] ? 'done' : ''} ${selectedRoute === r.id ? 'active' : ''}" onclick="zoomToRoute(${r.id})">
                <div class="route-left" onclick="event.stopPropagation()">
                    <input type="time" value="${time}" onchange="updateTime(${r.id}, this.value)" ${!isAdmin ? 'disabled' : ''}>
                    <input type="date" value="${date}" onchange="updateDate(${r.id}, this.value)" ${!isAdmin ? 'disabled' : ''}>
                </div>
                <div class="route-right">
                    <div class="route-label">LEG #${r.num}</div>
                    <div class="route-airports">
                        ${getFlag(r.fromCountry)}
                        <span>${r.from}</span>
                        <span class="route-arrow">➜</span>
                        <span>${r.to}</span>
                        ${getFlag(r.toCountry)}
                    </div>
                    <div class="route-cities">
                        <span>${r.fromCity || ''}</span>
                        <span>${r.toCity || ''}</span>
                    </div>
                    <div class="route-duration">⏱️ ${r.time} דקות</div>
                    <div class="metar-section">
                        <div class="metar-title">📡 METAR</div>
                        <div class="metar-row">
                            <span class="metar-icao">${r.from}</span>
                            <span class="metar-data">${formatMetar(metarCache[r.from])}</span>
                        </div>
                        <div class="metar-row">
                            <span class="metar-icao">${r.to}</span>
                            <span class="metar-data">${formatMetar(metarCache[r.to])}</span>
                        </div>
                    </div>
                </div>
                <div class="route-bottom" onclick="event.stopPropagation()">
                    <input type="checkbox" ${completed[r.id] ? 'checked' : ''} onchange="toggleRoute(${r.id})" ${!isAdmin ? 'disabled' : ''}>
                    <label>סימון בוצע</label>
                </div>
            </div>
        `;
    }).join('');

    const count = Object.values(completed).filter(Boolean).length;
    document.getElementById('completed').textContent = count;
}

function initMap() {
    try {
        console.log(`🗺️ initMap called, routes.length=${routes.length}, map=${map ? 'exists' : 'null'}`);
        if (typeof L !== 'undefined') {
            if (map) {
                refreshMapRoutes();
                return;
            }
            map = L.map('map').setView([20, 0], 3);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            drawnRoutes = [];
            console.log(`🗺️ Drawing ${routes.length} routes on map...`);
            routes.forEach(route => {
                const fromCoords = getOrCreateCoordinates(route.from);
                const toCoords = getOrCreateCoordinates(route.to);
                console.log(`  Route ${route.id}: ${route.from}${JSON.stringify(fromCoords)} → ${route.to}${JSON.stringify(toCoords)}`);
                drawMapRoute(route.id);
            });
            console.log(`✅ Map initialized with ${drawnRoutes.length} routes drawn`);
        } else {
            console.error('❌ Leaflet (L) is not loaded!');
        }
    } catch(e) {
        console.error('❌ Map initialization failed:', e);
    }
}

function refreshMapRoutes() {
    if (!map) return;
    // Clear existing routes from map
    drawnRoutes.forEach(r => {
        if (r.polyline) map.removeLayer(r.polyline);
        if (r.fromMarker) map.removeLayer(r.fromMarker);
        if (r.toMarker) map.removeLayer(r.toMarker);
    });
    drawnRoutes = [];
    // Redraw all routes with updated data
    routes.forEach(route => drawMapRoute(route.id));
    console.log('🗺️ Map refreshed with updated airport data');
}

async function loadAllMetar() {
    const allAirports = new Set();
    routes.forEach(r => {
        allAirports.add(r.from);
        allAirports.add(r.to);
    });

    const icaoList = Array.from(allAirports);
    // Fetch in batches of 5 to avoid overwhelming the server
    for (let i = 0; i < icaoList.length; i += 5) {
        const batch = icaoList.slice(i, i + 5);
        await Promise.all(batch.map(icao => fetchMetar(icao)));
        render(); // Re-render after each batch
    }
}

// Use DOMContentLoaded instead of window.onload to ensure we run after DOM is ready
console.log('🔧 Script loaded, document.readyState:', document.readyState);
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
        console.log('📍 DOMContentLoaded fired, calling init()');
        init();
    });
} else {
    // DOM is already loaded
    console.log('📍 DOM already loaded, calling init() immediately');
    init();
}

async function init() {
    console.log('🚀 Starting application...');

    // Step 1: Load built-in airport database
    loadBuiltInAirports();

    // Step 2: Load raw routes from Google Sheet
    const { rawRoutes, airportCodes } = await loadRawRoutesFromSheet();

    // Step 3: Check for airports not in built-in DB
    if (airportCodes) {
        const missing = airportCodes.filter(code => !airports[code]);
        if (missing.length > 0) {
            console.warn('⚠️ Airports not in built-in DB:', missing.join(', '));
        }
    }

    // Step 4: Build routes with airport data
    if (rawRoutes && rawRoutes.length > 0) {
        buildRoutesWithAirportInfo(rawRoutes);
    }

    // Step 4.5: Load saved data from server/localStorage BEFORE rendering
    await loadFromServer();

    // Step 5: Render and show map
    render();
    initMap();
    await loadAllMetar();
    updateAdminStatus();

    // Step 6: Register Service Worker for PWA support
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(registration => {
                console.log('✅ Service Worker registered:', registration);
            })
            .catch(error => {
                console.warn('⚠️ Service Worker registration failed:', error);
            });
    }

    // Step 7: Setup PWA install button
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
        console.log('📱 Install prompt available');
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`📱 User response to install: ${outcome}`);
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });

    window.addEventListener('appinstalled', () => {
        console.log('✅ PWA installed successfully!');
        installBtn.style.display = 'none';
    });
}
    </script>
