<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טבלת כל המסלולים</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }
        th {
            padding: 15px;
            text-align: right;
            border: 1px solid #ddd;
        }
        td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: right;
        }
        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }
        tbody tr:hover {
            background: #f0f0f0;
            transition: 0.2s;
        }
        .leg-num {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .airport-code {
            background: #e3f2fd;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .time {
            background: #fff3e0;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .stat-box p {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>✈️ טבלת כל המסלולים</h1>
        <table>
            <thead>
                <tr>
                    <th>LEG #</th>
                    <th>שדה המראה</th>
                    <th>שדה נחיתה</th>
                    <th>זמן טיסה (דקות)</th>
                    <th>שם שדה המראה</th>
                    <th>שם שדה נחיתה</th>
                </tr>
            </thead>
            <tbody id="routesTable">
            </tbody>
        </table>

        <div class="stats">
            <div class="stat-box">
                <h3 id="totalRoutes">47</h3>
                <p>סך הכל מסלולים</p>
            </div>
            <div class="stat-box">
                <h3 id="totalTime">0</h3>
                <p>סך הזמן בשעות</p>
            </div>
            <div class="stat-box">
                <h3 id="avgTime">0</h3>
                <p>ממוצע זמן טיסה</p>
            </div>
        </div>
    </div>

    <script>
        let airports = {};
        let airportInfo = {};

        async function loadAirportsFromCSV() {
            try {
                const sheetUrl = 'https://docs.google.com/spreadsheets/d/1xjwpIwAHoz-fLTNEck1gCsPxv8jSVM50FrnGK5new3M/export?format=csv';
                const response = await fetch(sheetUrl);
                const csv = await response.text();
                const lines = csv.trim().split('\n');
                const header = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());

                const icaoIdx = header.indexOf('icao_code');
                const nameIdx = header.indexOf('name');
                const latIdx = header.indexOf('latitude_deg');
                const lonIdx = header.indexOf('longitude_deg');
                const municipalityIdx = header.indexOf('municipality');

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line.trim()) continue;

                    const fields = [];
                    let current = '';
                    let inQuotes = false;
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            fields.push(current.trim().replace(/^"|"$/g, ''));
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    fields.push(current.trim().replace(/^"|"$/g, ''));

                    const icao = fields[icaoIdx];
                    if (!icao || !icao.trim()) continue;

                    const lat = parseFloat(fields[latIdx]);
                    const lon = parseFloat(fields[lonIdx]);

                    if (icao && !isNaN(lat) && !isNaN(lon)) {
                        airports[icao] = [lat, lon];
                        const municipality = fields[municipalityIdx];
                        const airportName = fields[nameIdx];
                        const cityName = municipality || airportName || icao;
                        airportInfo[icao] = cityName;
                    }
                }
            } catch (error) {
                console.error('Error loading airports.csv:', error);
            }
        }

        // Dummy old const to be replaced

            'MPMG': 'פנמה סיטי', 'SABP': 'בואנוס איירס'
        };

        function calculateFlightTime(from, to) {
            const fromCoords = airports[from];
            const toCoords = airports[to];
            if (!fromCoords || !toCoords) return 90;
            const R = 6371;
            const lat1 = fromCoords[0] * Math.PI / 180;
            const lat2 = toCoords[0] * Math.PI / 180;
            const dLat = (toCoords[0] - fromCoords[0]) * Math.PI / 180;
            const dLon = (toCoords[1] - fromCoords[1]) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c;
            const cruiseTime = (distance / 500) * 60;
            return Math.round(cruiseTime * 1.1) > 30 ? Math.round(cruiseTime * 1.1) : 90;
        }

        async function loadRoutesFromSheet() {
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/1FxCamcUs_L8-IT3ea24x0DYCg7-dig7a1Tz5rlIjZxY/export?format=csv';
            const response = await fetch(sheetUrl);
            const csv = await response.text();
            const lines = csv.trim().split('\n');

            let totalTime = 0;
            let legNum = 1;
            const tbody = document.getElementById('routesTable');
            let routeCount = 0;

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 3) {
                    const from = cols[1].toUpperCase().trim();
                    const to = cols[2].toUpperCase().trim();
                    const time = calculateFlightTime(from, to);
                    totalTime += time;

                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><div class="leg-num">#${legNum}</div></td>
                        <td><div class="airport-code">${from}</div></td>
                        <td><div class="airport-code">${to}</div></td>
                        <td><div class="time">${time}</div></td>
                        <td>${airportInfo[from] || from}</td>
                        <td>${airportInfo[to] || to}</td>
                    `;
                    legNum++;
                    routeCount++;
                }
            }

            // Update statistics
            document.getElementById('totalTime').textContent = (totalTime / 60).toFixed(1);
            document.getElementById('avgTime').textContent = routeCount > 0 ? Math.round(totalTime / routeCount) : 0;
        }

        (async () => {
            await loadAirportsFromCSV();
            loadRoutesFromSheet();
        })();
    </script>
